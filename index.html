<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoBox Education — School that travels with your family</title>
<meta name="description" content="Personalised education for expat and travelling families. A curriculum that adapts to your child, not the other way around.">
<meta property="og:title" content="NoBox Education — School that travels with your family">
<meta property="og:description" content="Personalised education for expat and travelling families.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nobox.education/">
<link rel="icon" href="logos/mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', sans-serif;
    color: #1a1a2a;
    overflow-x: hidden;
    background: linear-gradient(to bottom,
      #c0daf0 0%,
      #a8d4f0 10%,
      #8ec8ee 25%,
      #7abce8 40%,
      #90cce8 55%,
      #b8dce8 70%,
      #d4e8e0 85%,
      #e8e0c8 100%
    );
    min-height: 100vh;
  }

  html { scroll-behavior: smooth; }

  /* ── Clouds ── */
  .clouds {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .cloud {
    position: absolute;
    animation: drift linear infinite;
    opacity: 0.7;
  }
  .cloud svg { width: 100%; height: auto; }
  .cloud.c1 { width: 280px; top: 8%; animation-duration: 45s; }
  .cloud.c2 { width: 180px; top: 22%; animation-duration: 60s; animation-delay: -15s; }
  .cloud.c3 { width: 340px; top: 4%; animation-duration: 55s; animation-delay: -30s; }
  @keyframes drift {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(calc(100vw + 100%)); }
  }

  /* ── Nav ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: transparent;
    transition: background 0.3s, backdrop-filter 0.3s, box-shadow 0.3s;
  }
  nav.scrolled {
    background: rgba(192,218,240,0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }
  .nav-logo {
    font-size: 1.15rem; font-weight: 800; color: #1a1a2a;
    text-decoration: none; letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo svg { height: 30px; width: auto; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-link {
    font-size: 0.85rem; font-weight: 600; color: #5a5a6a;
    text-decoration: none; transition: color 0.2s;
  }
  .nav-link:hover { color: #1a1a2a; }

  /* ── Hero ── */
  .hero {
    min-height: 100vh;
    padding: 140px 40px 100px;
    text-align: center;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(124,144,112,0.15);
    color: #5a7a4a;
    font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2.5px;
    padding: 6px 18px; border-radius: 20px;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 800; color: #1a1a2a;
    line-height: 1.08; letter-spacing: -1.5px;
    margin-bottom: 20px; max-width: 700px;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #7c9070, #5b8aaa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 1.1rem; color: #5a5a6a;
    max-width: 520px; line-height: 1.65; margin-bottom: 36px;
  }

  /* ── Waitlist Form ── */
  .waitlist {
    display: flex; gap: 10px;
    max-width: 440px; width: 100%;
  }
  .waitlist input {
    flex: 1; padding: 14px 20px;
    border: 2px solid rgba(26,26,42,0.1);
    border-radius: 28px;
    font-family: inherit; font-size: 0.95rem;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .waitlist input:focus {
    border-color: #7c9070;
    box-shadow: 0 0 0 3px rgba(124,144,112,0.15);
  }
  .waitlist input::placeholder { color: #a0a0a8; }
  .waitlist button {
    padding: 14px 28px; border-radius: 28px;
    background: #f5c542; color: #1a1a2a;
    font-family: inherit; font-weight: 700; font-size: 0.95rem;
    border: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(245,197,66,0.3);
    white-space: nowrap;
  }
  .waitlist button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 16px rgba(245,197,66,0.4);
  }
  .waitlist button:disabled {
    opacity: 0.6; cursor: not-allowed; transform: none;
  }
  .waitlist-msg {
    margin-top: 12px; font-size: 0.85rem;
    min-height: 24px; text-align: center;
  }
  .waitlist-msg.success { color: #5a7a4a; }
  .waitlist-msg.error { color: #c44; }
  .waitlist-note {
    margin-top: 8px; font-size: 0.75rem;
    color: rgba(26,26,42,0.4);
  }

  /* ── Footer ── */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 40px;
    text-align: center;
    z-index: 1;
    color: rgba(26,26,42,0.3);
    font-size: 0.75rem;
  }
  footer a {
    color: rgba(26,26,42,0.4);
    text-decoration: none;
    transition: color 0.2s;
  }
  footer a:hover { color: rgba(26,26,42,0.7); }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    nav { padding: 14px 20px; }
    .hero { padding: 120px 24px 80px; }
    .waitlist { flex-direction: column; }
    .waitlist button { width: 100%; }
    footer { padding: 12px 20px; }
  }
</style>
</head>
<body>

  <!-- Clouds -->
  <div class="clouds">
    <div class="cloud c1">
      <svg viewBox="0 0 200 60" fill="white"><ellipse cx="70" cy="38" rx="60" ry="22"/><ellipse cx="110" cy="30" rx="50" ry="26"/><ellipse cx="50" cy="32" rx="40" ry="18"/><ellipse cx="140" cy="36" rx="35" ry="16"/></svg>
    </div>
    <div class="cloud c2">
      <svg viewBox="0 0 200 60" fill="white"><ellipse cx="80" cy="36" rx="55" ry="20"/><ellipse cx="120" cy="30" rx="45" ry="22"/><ellipse cx="55" cy="34" rx="35" ry="16"/></svg>
    </div>
    <div class="cloud c3">
      <svg viewBox="0 0 200 60" fill="white"><ellipse cx="90" cy="35" rx="65" ry="24"/><ellipse cx="130" cy="28" rx="50" ry="22"/><ellipse cx="50" cy="38" rx="45" ry="18"/><ellipse cx="160" cy="34" rx="30" ry="14"/></svg>
    </div>
  </div>

  <!-- Nav -->
  <nav id="nav">
    <a href="/" class="nav-logo">
      <svg viewBox="0 0 714 595" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M712.565 391.746L354.565 593.246V138.378L712.565 152.746V391.746Z" fill="#6CA373" stroke="#6CA373"/>
        <line x1="407.212" y1="242.9" x2="610.217" y2="251.642" stroke="#FDF8F8" stroke-width="7" stroke-linecap="round"/>
        <line x1="407.187" y1="310.873" x2="626.19" y2="318.659" stroke="#FDF8F8" stroke-width="7" stroke-linecap="round"/>
        <line x1="407.178" y1="377.863" x2="644.181" y2="385.633" stroke="#FDF8F8" stroke-width="7" stroke-linecap="round"/>
        <path d="M0.564697 391.246V152.246L353.565 138.378V593.246L0.564697 391.246Z" fill="#F4AD50" stroke="#F4AD50"/>
        <line x1="111.412" y1="251.6" x2="314.417" y2="242.941" stroke="#FDF8F8" stroke-width="7" stroke-linecap="round"/>
        <line x1="91.4409" y1="318.627" x2="314.445" y2="310.87" stroke="#FDF8F8" stroke-width="7" stroke-linecap="round"/>
        <line x1="74.4496" y1="385.635" x2="314.453" y2="377.861" stroke="#FDF8F8" stroke-width="7" stroke-linecap="round"/>
        <path d="M1.26465 151.646L153.265 0.646484L352.565 137.446L1.26465 151.646Z" fill="#F8BE4B" stroke="#F8BE4B"/>
        <path d="M559.788 0.835372L711.457 151.664L355.564 137.446L559.788 0.835372Z" fill="#79BD84" stroke="#79BD84"/>
        <path d="M354.055 138.647L354.055 592.647" stroke="#B49AF7" stroke-width="3" stroke-linecap="round"/>
      </svg>
      NoBox Education
    </a>
    <div class="nav-right">
      <a href="https://noboxdev.com" class="nav-link">By NoBoxDev</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <span class="hero-badge">Coming Soon</span>
    <h1>School that <em>travels</em> with your family</h1>
    <p>Personalised education for children of expat and travelling families. A curriculum that adapts to your child — not the other way around.</p>
    <form class="waitlist" id="waitlist-hero" onsubmit="return submitWaitlist(event, this)">
      <input type="email" placeholder="your@email.com" required aria-label="Email address">
      <button type="submit">Join the waitlist</button>
    </form>
    <div class="waitlist-msg" id="msg-hero"></div>
    <p class="waitlist-note">We'll let you know when we launch. No spam.</p>
  </section>

  <!-- Footer -->
  <footer>
    <a href="https://noboxdev.com">NoBoxDev</a> &middot; &copy; 2026
  </footer>

  <!-- Analytics -->
  <script src="https://marketing.noboxdev.com/t.js" data-site="nobox.education" defer></script>

  <script>
    // Nav scroll
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });

    // Waitlist form
    async function submitWaitlist(e, form) {
      e.preventDefault();
      const input = form.querySelector('input');
      const btn = form.querySelector('button');
      const msgEl = document.getElementById('msg-hero');

      btn.disabled = true;
      btn.textContent = 'Joining...';
      msgEl.textContent = '';
      msgEl.className = 'waitlist-msg';

      try {
        const res = await fetch('https://api.noboxdev.com/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: input.value,
            source: 'nobox-education-waitlist',
            product: 'education',
          }),
        });

        if (res.ok) {
          msgEl.textContent = "You're on the list! We'll be in touch.";
          msgEl.className = 'waitlist-msg success';
          input.value = '';
        } else {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Request failed');
        }
      } catch (err) {
        msgEl.textContent = err.message || 'Something went wrong. Please try again.';
        msgEl.className = 'waitlist-msg error';
      }

      btn.disabled = false;
      btn.textContent = 'Join the waitlist';
      return false;
    }
  </script>
</body>
</html>
