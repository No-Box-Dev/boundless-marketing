<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intake 4 — Conversational Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Baloo 2', sans-serif; color: #1a1a2a;
    background: linear-gradient(to bottom, #c0daf0, #8ec8ee);
    min-height: 100vh;
  }
  .page-behind {
    position: fixed; inset: 0; z-index: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; color: rgba(26,26,42,0.2); font-weight: 700;
  }
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }

  .chat-popup {
    width: 520px; max-width: 92vw;
    height: 600px; max-height: 85vh;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(40px) saturate(1.8);
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 24px 80px rgba(0,0,0,0.12);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Chat header */
  .chat-header {
    padding: 20px 24px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .chat-avatar {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #6CA373, #4a8a55);
    display: flex; align-items: center; justify-content: center;
  }
  .chat-avatar svg { width: 22px; height: auto; }
  .chat-header-text h3 { font-size: 0.95rem; font-weight: 700; }
  .chat-header-text p { font-size: 0.7rem; color: rgba(26,26,42,0.4); }
  .chat-close {
    margin-left: auto; width: 32px; height: 32px; border-radius: 50%;
    background: rgba(26,26,42,0.06); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; color: rgba(26,26,42,0.4);
  }

  /* Messages area */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: none;
  }
  .chat-messages::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 85%; animation: msgIn 0.4s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-bot {
    align-self: flex-start;
    background: rgba(108,163,115,0.1);
    border-radius: 18px 18px 18px 4px;
    padding: 14px 18px;
  }
  .msg-bot p { font-size: 0.92rem; line-height: 1.5; color: #1a1a2a; }
  .msg-user {
    align-self: flex-end;
    background: #6CA373;
    border-radius: 18px 18px 4px 18px;
    padding: 14px 18px; color: #fff;
  }
  .msg-user p { font-size: 0.92rem; line-height: 1.5; }

  /* Choice buttons in chat */
  .msg-choices {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 10px;
  }
  .msg-choice {
    padding: 10px 18px; border-radius: 20px;
    border: 2px solid rgba(108,163,115,0.3);
    background: #fff; cursor: pointer; font-family: inherit;
    font-size: 0.82rem; font-weight: 600;
    transition: all 0.2s;
  }
  .msg-choice:hover { border-color: #6CA373; background: rgba(108,163,115,0.06); }
  .msg-choice.selected { border-color: #6CA373; background: rgba(108,163,115,0.12); }

  /* Input area */
  .chat-input {
    padding: 16px 24px;
    border-top: 1px solid rgba(0,0,0,0.05);
    display: flex; gap: 10px; align-items: center;
  }
  .chat-input input {
    flex: 1; padding: 12px 18px;
    border: 2px solid rgba(26,26,42,0.08);
    border-radius: 22px; font-family: inherit;
    font-size: 0.92rem; outline: none;
    background: rgba(255,255,255,0.6);
  }
  .chat-input input:focus { border-color: #6CA373; }
  .chat-send {
    width: 40px; height: 40px; border-radius: 50%;
    background: #f5c542; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .chat-send:hover { transform: scale(1.08); }
  .chat-send svg { width: 18px; height: 18px; fill: #1a1a2a; }
</style>
</head>
<body>

<div class="page-behind"><p>[ Website visible behind ]</p></div>

<div class="overlay">
  <div class="chat-popup">

    <div class="chat-header">
      <div class="chat-avatar">
        <svg viewBox="0 0 714 595" fill="none"><path d="M712.565 391.746L354.565 593.246V138.378L712.565 152.746V391.746Z" fill="rgba(255,255,255,0.4)"/><path d="M0.564697 391.246V152.246L353.565 138.378V593.246L0.564697 391.246Z" fill="rgba(255,255,255,0.6)"/><path d="M354.055 138.647L354.055 592.647" stroke="rgba(255,255,255,0.5)" stroke-width="4"/></svg>
      </div>
      <div class="chat-header-text">
        <h3>NoBox Education</h3>
        <p>Intake survey</p>
      </div>
      <button class="chat-close">&times;</button>
    </div>

    <div class="chat-messages" id="chat">
      <div class="msg msg-bot">
        <p>Hi there! I'd love to learn about your child so we can design the perfect learning journey.</p>
        <p style="margin-top:8px;font-weight:600;">What's your child's first name?</p>
      </div>
    </div>

    <div class="chat-input">
      <input type="text" placeholder="Type your answer..." id="chat-field">
      <button class="chat-send" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>

  </div>
</div>

<script>
  const chat = document.getElementById('chat');
  const field = document.getElementById('chat-field');
  const botQuestions = [
    { text: 'How old are they?', choices: ['4–6 years', '7–9 years', '10–12 years', '13+'] },
    { text: 'Which subjects interest them most?', choices: ['Maths', 'Languages', 'Science', 'Art', 'Life Skills'] },
    { text: 'Where are you currently based?', input: true },
    { text: 'Last question — what\'s your email so we can send the personalised plan?', input: true, placeholder: 'your@email.com' },
  ];
  let step = 0;

  function sendMsg() {
    const val = field.value.trim();
    if (!val) return;
    addMsg(val, 'user');
    field.value = '';
    setTimeout(() => askNext(), 600);
  }

  function askNext() {
    if (step >= botQuestions.length) {
      addMsg('Thank you! We\'ll review everything and get back within 24 hours with a tailored plan. 🎓', 'bot');
      return;
    }
    const q = botQuestions[step];
    const div = document.createElement('div');
    div.className = 'msg msg-bot';
    let html = '<p>' + q.text + '</p>';
    if (q.choices) {
      html += '<div class="msg-choices">';
      q.choices.forEach(c => {
        html += '<button class="msg-choice" onclick="pickChoice(this,\'' + c + '\')">' + c + '</button>';
      });
      html += '</div>';
    }
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    if (q.input) field.placeholder = q.placeholder || 'Type your answer...';
    step++;
  }

  function pickChoice(el, val) {
    el.parentElement.querySelectorAll('.msg-choice').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    setTimeout(() => {
      addMsg(val, 'user');
      setTimeout(() => askNext(), 600);
    }, 300);
  }

  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + type;
    div.innerHTML = '<p>' + text + '</p>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  field.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
