<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intake 2 — Card Stack</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Baloo 2', sans-serif; color: #1a1a2a;
    background: linear-gradient(to bottom, #c0daf0, #8ec8ee, #b8dce8);
    min-height: 100vh;
  }
  .page-behind {
    position: fixed; inset: 0; z-index: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; color: rgba(26,26,42,0.2); font-weight: 700;
  }
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }

  /* Card stack container */
  .card-stack {
    position: relative;
    width: 600px; max-width: 90vw;
    height: 480px;
  }

  /* Individual cards */
  .card {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(40px) saturate(1.8);
    -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 16px 60px rgba(0,0,0,0.1);
    padding: 44px 40px;
    display: flex; flex-direction: column;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0; transform: scale(0.92) translateY(24px);
    pointer-events: none;
  }
  .card.active {
    opacity: 1; transform: scale(1) translateY(0);
    pointer-events: all; z-index: 10;
  }
  /* Stacked cards peeking behind */
  .card.peek-1 {
    opacity: 0.6; transform: scale(0.95) translateY(-12px);
    z-index: 5;
  }
  .card.peek-2 {
    opacity: 0.3; transform: scale(0.9) translateY(-22px);
    z-index: 2;
  }
  .card.done {
    opacity: 0; transform: scale(1.05) translateY(-60px);
    z-index: 0;
  }

  /* Close button */
  .card-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(26,26,42,0.06); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; color: rgba(26,26,42,0.4);
  }
  .card-close:hover { background: rgba(26,26,42,0.1); }

  /* Card content */
  .card-step {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 3px; color: #7c9070; margin-bottom: 8px;
  }
  .card h2 {
    font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px;
    line-height: 1.2; margin-bottom: 20px;
  }
  .card-body { flex: 1; }

  .c-input {
    width: 100%; padding: 16px 20px;
    border: 2px solid rgba(26,26,42,0.08);
    border-radius: 14px; font-family: inherit;
    font-size: 1rem; background: rgba(255,255,255,0.5);
    outline: none; transition: border-color 0.3s;
  }
  .c-input:focus { border-color: #6CA373; }

  .c-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .c-opt {
    padding: 14px 16px; border-radius: 14px;
    border: 2px solid rgba(26,26,42,0.06);
    background: rgba(26,26,42,0.02);
    cursor: pointer; font-family: inherit;
    font-size: 0.9rem; font-weight: 600;
    text-align: center; transition: all 0.3s;
  }
  .c-opt:hover { border-color: rgba(108,163,115,0.3); background: rgba(108,163,115,0.06); }
  .c-opt.selected { border-color: #6CA373; background: rgba(108,163,115,0.1); }

  /* Progress dots */
  .card-dots {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 20px;
  }
  .card-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(26,26,42,0.12); transition: all 0.3s;
  }
  .card-dot.active { background: #6CA373; width: 24px; border-radius: 4px; }
  .card-dot.done { background: #F4AD50; }

  .card-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: auto; padding-top: 20px;
  }
  .c-btn {
    padding: 12px 28px; border-radius: 22px;
    font-family: inherit; font-size: 0.88rem; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s;
  }
  .c-prev { background: rgba(26,26,42,0.06); color: #1a1a2a; }
  .c-next { background: #f5c542; color: #1a1a2a; box-shadow: 0 2px 8px rgba(245,197,66,0.3); }
  .c-next:hover { transform: translateY(-1px); }

  /* Responsive */
  @media (max-width: 600px) {
    .card-stack { max-width: 100vw; height: auto; min-height: 420px; }
    .card { padding: 28px 24px; }
    .card h2 { font-size: 1.3rem; }
    .card-nav { padding: 0 24px 24px; }
  }
</style>
</head>
<body>

<div class="page-behind"><p>[ Website visible behind ]</p></div>

<div class="overlay">
  <div class="card-stack" id="stack">

    <div class="card active" data-q="0">
      <button class="card-close">&times;</button>
      <div class="card-step">Step 1 of 5</div>
      <h2>What's your child's name?</h2>
      <div class="card-body">
        <input class="c-input" placeholder="Their first name..." autofocus>
      </div>
      <div class="card-dots" id="dots">
        <div class="card-dot active"></div><div class="card-dot"></div><div class="card-dot"></div><div class="card-dot"></div><div class="card-dot"></div>
      </div>
      <div class="card-nav">
        <span></span>
        <button class="c-btn c-next" onclick="nextCard()">Next</button>
      </div>
    </div>

    <div class="card peek-1" data-q="1">
      <div class="card-step">Step 2 of 5</div>
      <h2>How old are they?</h2>
      <div class="card-body">
        <div class="c-options">
          <button class="c-opt" onclick="this.classList.toggle('selected')">4–6</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">7–9</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">10–12</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">13+</button>
        </div>
      </div>
      <div class="card-nav">
        <button class="c-btn c-prev" onclick="prevCard()">Back</button>
        <button class="c-btn c-next" onclick="nextCard()">Next</button>
      </div>
    </div>

    <div class="card peek-2" data-q="2">
      <div class="card-step">Step 3 of 5</div>
      <h2>Which subjects interest them?</h2>
      <div class="card-body">
        <div class="c-options">
          <button class="c-opt" onclick="this.classList.toggle('selected')">Maths</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">Languages</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">Science</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">Art</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">Life Skills</button>
          <button class="c-opt" onclick="this.classList.toggle('selected')">Music</button>
        </div>
      </div>
      <div class="card-nav">
        <button class="c-btn c-prev" onclick="prevCard()">Back</button>
        <button class="c-btn c-next" onclick="nextCard()">Next</button>
      </div>
    </div>

    <div class="card" data-q="3">
      <div class="card-step">Step 4 of 5</div>
      <h2>Where are you currently based?</h2>
      <div class="card-body">
        <input class="c-input" placeholder="City or country...">
      </div>
      <div class="card-nav">
        <button class="c-btn c-prev" onclick="prevCard()">Back</button>
        <button class="c-btn c-next" onclick="nextCard()">Next</button>
      </div>
    </div>

    <div class="card" data-q="4">
      <div class="card-step">Final step</div>
      <h2>Where should we send your plan?</h2>
      <div class="card-body">
        <input class="c-input" type="email" placeholder="your@email.com" style="margin-bottom:12px;">
        <p style="font-size:0.78rem; color:rgba(26,26,42,0.4);">We'll get back within 24 hours.</p>
      </div>
      <div class="card-nav">
        <button class="c-btn c-prev" onclick="prevCard()">Back</button>
        <button class="c-btn c-next" style="background:#6CA373;color:#fff;">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
  let cur = 0;
  const cards = document.querySelectorAll('.card');
  const dots = document.querySelectorAll('.card-dot');
  function update() {
    cards.forEach((c, i) => {
      c.className = 'card';
      if (i === cur) c.classList.add('active');
      else if (i === cur + 1) c.classList.add('peek-1');
      else if (i === cur + 2) c.classList.add('peek-2');
      else if (i < cur) c.classList.add('done');
    });
    dots.forEach((d, i) => {
      d.className = 'card-dot';
      if (i === cur) d.classList.add('active');
      else if (i < cur) d.classList.add('done');
    });
  }
  function nextCard() { if (cur < cards.length - 1) { cur++; update(); } }
  function prevCard() { if (cur > 0) { cur--; update(); } }
</script>
</body>
</html>
